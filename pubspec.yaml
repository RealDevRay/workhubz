name: workhubz
description: "Find and book affordable workspaces in Nairobi with WorkHubz"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Maps & Location
  google_maps_flutter: ^2.14.2
  geolocator: ^11.1.0

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^5.0.2

  # Backend
  supabase_flutter: ^2.8.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Components
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  google_fonts: ^6.3.3
  carousel_slider: ^4.2.1

  # Utilities
  intl: ^0.19.0
  json_annotation: ^4.9.0
  qr_flutter: ^4.1.0
  share_plus: ^7.2.2
  url_launcher: ^6.3.1

  # Routing & Navigation
  go_router: ^14.8.1

  # Date/Time
  table_calendar: ^3.1.3

  # Permissions
  permission_handler: ^11.4.0

  # Utility
  uuid: ^4.5.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  image_path: assets/branding/app_icon_legacy.png
  adaptive_icon_background: assets/branding/app_icon_bg.png
  adaptive_icon_foreground: assets/branding/app_icon_fg.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/branding/
