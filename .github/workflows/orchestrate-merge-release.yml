name: Orchestrate Merge and Release

on:
  workflow_dispatch:
    inputs:
      head_branch:
        description: "Feature branch to merge (e.g. fix/something)"
        required: true
        type: string
      base_branch:
        description: "Target branch"
        required: false
        default: "main"
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: true
        type: boolean
      tag_prefix:
        description: "Tag prefix"
        required: false
        default: "v"
        type: string
      timeout_minutes:
        description: "Max wait time for PR merge"
        required: false
        default: "60"
        type: string
      watch_release:
        description: "Wait for release workflow completion"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  orchestrate:
    name: Auto merge then trigger release
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HEAD_BRANCH: ${{ inputs.head_branch }}
      BASE_BRANCH: ${{ inputs.base_branch }}
      PRERELEASE: ${{ inputs.prerelease }}
      TAG_PREFIX: ${{ inputs.tag_prefix }}
      TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
      WATCH_RELEASE: ${{ inputs.watch_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [ -z "${HEAD_BRANCH}" ]; then
            echo "head_branch is required"
            exit 1
          fi
          if [ "${HEAD_BRANCH}" = "${BASE_BRANCH}" ]; then
            echo "head_branch and base_branch cannot be the same"
            exit 1
          fi

      - name: Create/reuse PR and enable auto-merge
        id: pr
        run: |
          set -euo pipefail

          echo "Checking for open PR from ${HEAD_BRANCH} -> ${BASE_BRANCH}"
          OPEN_PR_JSON=$(gh pr list -R "${REPO}" --state open --head "${HEAD_BRANCH}" --base "${BASE_BRANCH}" --json number,url,title -L 1)
          OPEN_PR_COUNT=$(echo "${OPEN_PR_JSON}" | jq 'length')

          if [ "${OPEN_PR_COUNT}" -gt 0 ]; then
            PR_NUMBER=$(echo "${OPEN_PR_JSON}" | jq -r '.[0].number')
            PR_URL=$(echo "${OPEN_PR_JSON}" | jq -r '.[0].url')
            echo "Using existing open PR #${PR_NUMBER}: ${PR_URL}"
          else
            MERGED_PR_JSON=$(gh pr list -R "${REPO}" --state merged --head "${HEAD_BRANCH}" --base "${BASE_BRANCH}" --json number,url,mergedAt -L 1)
            MERGED_PR_COUNT=$(echo "${MERGED_PR_JSON}" | jq 'length')

            if [ "${MERGED_PR_COUNT}" -gt 0 ]; then
              PR_NUMBER=$(echo "${MERGED_PR_JSON}" | jq -r '.[0].number')
              PR_URL=$(echo "${MERGED_PR_JSON}" | jq -r '.[0].url')
              echo "Branch already merged via PR #${PR_NUMBER}: ${PR_URL}"
            else
              TITLE="Merge ${HEAD_BRANCH} into ${BASE_BRANCH}"
              BODY=$(cat <<EOF
Automated PR created by orchestrate workflow.

- Base: ${BASE_BRANCH}
- Head: ${HEAD_BRANCH}

This PR is configured for auto-merge (squash) once required checks pass.
EOF
)

              PR_URL=$(gh pr create -R "${REPO}" --base "${BASE_BRANCH}" --head "${HEAD_BRANCH}" --title "${TITLE}" --body "${BODY}")
              PR_NUMBER=$(gh pr view "${PR_URL}" -R "${REPO}" --json number -q '.number')
              echo "Created PR #${PR_NUMBER}: ${PR_URL}"
            fi
          fi

          MERGED_AT=$(gh pr view "${PR_NUMBER}" -R "${REPO}" --json mergedAt -q '.mergedAt')
          if [ "${MERGED_AT}" = "null" ] || [ -z "${MERGED_AT}" ]; then
            gh pr merge "${PR_NUMBER}" -R "${REPO}" --auto --squash --delete-branch
            echo "Enabled auto-merge for PR #${PR_NUMBER}"
          else
            echo "PR #${PR_NUMBER} already merged"
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for merge
        id: merged
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          ATTEMPTS=$(( (TIMEOUT_MINUTES * 60) / 15 ))
          if [ "${ATTEMPTS}" -lt 1 ]; then ATTEMPTS=1; fi

          echo "Waiting for PR #${PR_NUMBER} to merge (max ${TIMEOUT_MINUTES} min)..."

          for i in $(seq 1 ${ATTEMPTS}); do
            STATE=$(gh pr view "${PR_NUMBER}" -R "${REPO}" --json state -q '.state')
            MERGED_AT=$(gh pr view "${PR_NUMBER}" -R "${REPO}" --json mergedAt -q '.mergedAt')

            if [ "${MERGED_AT}" != "null" ] && [ -n "${MERGED_AT}" ]; then
              echo "Merged at ${MERGED_AT}"
              echo "merged_at=${MERGED_AT}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "${STATE}" = "CLOSED" ]; then
              echo "PR #${PR_NUMBER} was closed without merge"
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for PR merge"
          exit 1

      - name: Compute next tag
        id: tag
        run: |
          set -euo pipefail

          REF_LINES=$(git ls-remote --tags --refs "https://github.com/${REPO}.git" "${TAG_PREFIX}*")
          LATEST_VERSION=$(echo "${REF_LINES}" | sed -n "s#.*refs/tags/${TAG_PREFIX}\([0-9]\+\.[0-9]\+\.[0-9]\+\)$#\1#p" | sort -V | tail -n 1)

          if [ -z "${LATEST_VERSION}" ]; then
            NEXT_TAG="${TAG_PREFIX}0.1.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_VERSION}"
            PATCH=$((PATCH + 1))
            NEXT_TAG="${TAG_PREFIX}${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "Next tag: ${NEXT_TAG}"
          echo "next_tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"

      - name: Trigger Release workflow
        id: release
        run: |
          set -euo pipefail

          NEXT_TAG="${{ steps.tag.outputs.next_tag }}"
          RUN_OUTPUT=$(gh workflow run Release -R "${REPO}" -f tag="${NEXT_TAG}" -f target_commitish="${BASE_BRANCH}" -f prerelease="${PRERELEASE}")
          echo "${RUN_OUTPUT}"

          RUN_ID=$(echo "${RUN_OUTPUT}" | sed -n 's#.*actions/runs/\([0-9]\+\).*#\1#p' | tail -n 1)
          if [ -n "${RUN_ID}" ]; then
            echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
            echo "run_url=https://github.com/${REPO}/actions/runs/${RUN_ID}" >> "$GITHUB_OUTPUT"
          fi

      - name: Watch Release workflow
        if: ${{ inputs.watch_release }}
        run: |
          set -euo pipefail
          RUN_ID="${{ steps.release.outputs.run_id }}"
          if [ -z "${RUN_ID}" ]; then
            echo "Could not parse release run id"
            exit 1
          fi
          gh run watch "${RUN_ID}" -R "${REPO}" --exit-status

      - name: Summary
        run: |
          echo "PR: ${{ steps.pr.outputs.pr_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Merged at: ${{ steps.merged.outputs.merged_at }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggered tag: ${{ steps.tag.outputs.next_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Release run: ${{ steps.release.outputs.run_url }}" >> "$GITHUB_STEP_SUMMARY"
