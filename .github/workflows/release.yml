name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1)"
        required: true
        type: string
      target_commitish:
        description: "Branch or commit to tag from"
        required: false
        default: "main"
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build signed APK/AAB and publish release
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MPESA_CONSUMER_KEY: ${{ secrets.MPESA_CONSUMER_KEY }}
      MPESA_CONSUMER_SECRET: ${{ secrets.MPESA_CONSUMER_SECRET }}
      MPESA_PASSKEY: ${{ secrets.MPESA_PASSKEY }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tag exists for manual run
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          if git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ inputs.tag }}"
          else
            git tag "${{ inputs.tag }}" "${{ inputs.target_commitish }}"
            git push origin "${{ inputs.tag }}"
          fi

      - name: Validate required secrets
        run: |
          missing=""
          for key in SUPABASE_URL SUPABASE_ANON_KEY MAPS_API_KEY ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "$(printenv "$key")" ]; then
              missing="$missing $key"
            fi
          done
          if [ -n "$missing" ]; then
            echo "Missing required secrets:$missing"
            exit 1
          fi

      - name: Decode Android keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      - name: Create key.properties
        run: |
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=app/release-keystore.jks"
          } > android/key.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build signed release APK
        run: >-
          flutter build apk --release
          --dart-define=SUPABASE_URL=${SUPABASE_URL}
          --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          --dart-define=GROQ_API_KEY=${GROQ_API_KEY}
          --dart-define=MPESA_CONSUMER_KEY=${MPESA_CONSUMER_KEY}
          --dart-define=MPESA_CONSUMER_SECRET=${MPESA_CONSUMER_SECRET}
          --dart-define=MPESA_PASSKEY=${MPESA_PASSKEY}

      - name: Build signed release AAB
        run: >-
          flutter build appbundle --release
          --dart-define=SUPABASE_URL=${SUPABASE_URL}
          --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          --dart-define=GROQ_API_KEY=${GROQ_API_KEY}
          --dart-define=MPESA_CONSUMER_KEY=${MPESA_CONSUMER_KEY}
          --dart-define=MPESA_CONSUMER_SECRET=${MPESA_CONSUMER_SECRET}
          --dart-define=MPESA_PASSKEY=${MPESA_PASSKEY}

      - name: Set release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename build artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "workhubz-${{ steps.meta.outputs.tag }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "workhubz-${{ steps.meta.outputs.tag }}.aab"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: WorkHubz ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            workhubz-${{ steps.meta.outputs.tag }}.apk
            workhubz-${{ steps.meta.outputs.tag }}.aab
