name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://example.supabase.co' }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'dummy_anon_key' }}
      MAPS_API_KEY: ${{ secrets.MAPS_API_KEY || 'DUMMY_MAPS_KEY' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MPESA_CONSUMER_KEY: ${{ secrets.MPESA_CONSUMER_KEY }}
      MPESA_CONSUMER_SECRET: ${{ secrets.MPESA_CONSUMER_SECRET }}
      MPESA_PASSKEY: ${{ secrets.MPESA_PASSKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: >-
          flutter build apk --release
          --dart-define=SUPABASE_URL=${SUPABASE_URL}
          --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          --dart-define=GROQ_API_KEY=${GROQ_API_KEY}
          --dart-define=MPESA_CONSUMER_KEY=${MPESA_CONSUMER_KEY}
          --dart-define=MPESA_CONSUMER_SECRET=${MPESA_CONSUMER_SECRET}
          --dart-define=MPESA_PASSKEY=${MPESA_PASSKEY}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: workhubz-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
